<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#030712">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ALTHERA">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>ALTHERA — Super Platforma</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
/* Stil qismi o'zgarishsiz qoladi yoki yangilangan dizaynga moslanadi */
:root {
  --bg: #030712; --bg1: #070f1e; --sf: #0f2040; --cyan: #06cdf4; --green: #10b981; --red: #ef4444; --text: #eef2ff; --t2: #94a3b8;
}
/* ... sizning mavjud CSS stillaringiz ... */
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="app">
    <div id="toast" class="toast">
        <span id="toast-msg"></span>
    </div>

    <section id="s-login" class="scr show">
        <div class="login-bg"></div>
        <div class="login-form">
            <h1 class="login-hero-logo">ALTHERA</h1>
            <p style="text-align:center; color:var(--t2); margin-bottom:20px;">Ekotizimga xush kelibsiz</p>
            <button id="google-auth" class="btn btn-primary btn-full">
                <span class="ni-ic">G</span> Google orqali kirish
            </button>
        </div>
    </section>

    <section id="s-home" class="scr hide">
        <div class="sb">
            <div class="sb-logo">ALTHERA</div>
            <div id="user-info" class="sb-r">
                <span id="user-name"></span>
                <div class="sb-notif"></div>
            </div>
        </div>
        
        <div class="sa">
            <div class="bal-card">
                <div class="bal-label">Asosiy Balans</div>
                <div class="bal-amount mono" id="main-balance">5,450,000 UZS</div>
                <div class="bal-usd" id="usd-rate">Kurs: yuklanmoqda...</div>
                <div class="bal-actions">
                    <div class="ba" onclick="payService('Soliq')">
                        <div class="ba-ic">🏛️</div><div class="ba-lb">Soliq</div>
                    </div>
                    <div class="ba" onclick="payService('Kommunal')">
                        <div class="ba-ic">⚡</div><div class="ba-lb">Kommunal</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
// 1. Firebase Konfiguratsiyasi (O'zingizning kalitlaringizni qo'ying)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "althera-app.firebaseapp.com",
  projectId: "althera-app",
  storageBucket: "althera-app.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 2. Google Auth Integratsiyasi
document.getElementById('google-auth').addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then((result) => {
        toast("Xush kelibsiz, " + result.user.displayName + " ✓");
        showScreen('s-home');
        document.getElementById('user-name').textContent = result.user.displayName;
    }).catch(err => toast("Xatolik: " + err.message, "err"));
});

// 3. Valyuta Kursini Olish (CBU API)
async function getExchangeRate() {
    try {
        const response = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
        const data = await response.json();
        const usd = data.find(item => item.Ccy === 'USD');
        document.getElementById('usd-rate').textContent = `1 USD = ${usd.Rate} UZS (CBU)`;
    } catch (e) {
        document.getElementById('usd-rate').textContent = "Kursni yangilab bo'lmadi";
    }
}
getExchangeRate();

// 4. Ma'lumotlar bazasiga yozish (Firestore)
async function payService(serviceName) {
    const user = auth.currentUser;
    if (!user) return toast("Iltimos, avval tizimga kiring", "err");

    try {
        await db.collection("payments").add({
            uid: user.uid,
            service: serviceName,
            amount: 50000, // Misol uchun statik qiymat
            date: new Date().toISOString(),
            status: "Muvaffaqiyatli"
        });
        toast(`${serviceName} to'lovi amalga oshirildi ✓`);
    } catch (e) {
        toast("Bazaga yozishda xatolik", "err");
    }
}

// 5. Toast Xabarnomasi
function toast(msg, type = '') {
    const el = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.classList.remove('show'), 3000);
}

function showScreen(id) {
    document.querySelectorAll('.scr').forEach(s => s.classList.replace('show', 'hide'));
    document.getElementById(id).classList.replace('hide', 'show');
}

// PWA Service Worker Register
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(() => {
            console.log('ALTHERA PWA Tayyor');
        });
    });
}
</script>
</body>
</html>
